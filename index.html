<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="script-src 'unsafe-inline';"/>
<title>行事曆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" media="print" onload="this.media='all'">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#cdd9d0;color:#1c2d20;font-family:'Noto Sans TC','PingFang TC',sans-serif;min-height:100vh;}
.page{display:flex;flex-direction:column;min-height:100vh;padding:18px 14px 60px;}
.label-tag{font-family:'Syne','PingFang TC',sans-serif;font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#b06000;display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.label-tag::before{content:'';width:14px;height:2px;background:#b06000;border-radius:2px;}
.month-title{font-family:'Syne','PingFang TC',sans-serif;font-size:clamp(38px,5vw,62px);font-weight:800;line-height:1.1;color:#152a18;margin-bottom:12px;}
.month-title span{color:#2a6e38;}
.controls{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.quick-wrap{position:relative;}
.quick-trigger{display:flex;align-items:center;gap:5px;background:#fff8e6;border:2px solid #d4900a;color:#7a4800;height:38px;padding:0 14px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.quick-trigger:hover,.quick-trigger.open{background:#d4900a;color:#fff;}
.quick-dd{display:none;position:absolute;top:calc(100%+6px);left:0;background:#fff;border:2px solid #d4900a;border-radius:10px;overflow:hidden;z-index:400;min-width:160px;box-shadow:0 8px 24px rgba(180,100,0,.18);}
.quick-dd.show{display:block;}
.qopt{padding:11px 16px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px solid #f5e0b0;white-space:nowrap;color:#5a3800;}
.qopt:last-child{border-bottom:none;}
.qopt:hover{background:#fff3cc;}
.ov-group{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.ov-label{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;font-size:13px;font-weight:700;color:#2a5c30;}
.ov-label input[type=checkbox]{appearance:none;-webkit-appearance:none;width:18px;height:18px;border-radius:4px;border:2px solid #6aaa72;background:#fff;cursor:pointer;position:relative;flex-shrink:0;}
.ov-label input:checked{background:#2a7040;border-color:#1a5028;}
.ov-label input:checked::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:900;color:#fff;}
.shift-leave-check{display:flex;align-items:center;gap:4px;margin-left:auto;font-size:11px;color:#5c7a62;cursor:pointer;user-select:none;white-space:nowrap;flex-shrink:0;}
.shift-leave-check input[type=checkbox]{appearance:none;-webkit-appearance:none;width:15px;height:15px;border-radius:3px;border:1.5px solid #6aaa72;background:#fff;cursor:pointer;position:relative;flex-shrink:0;}
.shift-leave-check input:checked{background:#2a7040;border-color:#1a5028;}
.shift-leave-check input:checked::after{content:'✓';position:absolute;inset:0;display:grid;place-items:center;font-size:9px;font-weight:900;color:#fff;}
.csg-logo{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;background:#fff;border:1px solid #b8ccbc;overflow:hidden;padding:1px;flex-shrink:0;}
.asml-logo{display:inline-flex;align-items:center;justify-content:center;height:18px;width:58px;background:#fff;border:1px solid #b8ccbc;border-radius:3px;overflow:hidden;padding:2px 3px;flex-shrink:0;}
.nav-group{display:flex;align-items:center;gap:6px;}
.nav-btn{height:36px;padding:0 14px;border:2px solid #5a9a60;background:#fff;color:#1a5020;border-radius:20px;cursor:pointer;font-size:13px;font-weight:700;}
.nav-btn:hover{background:#2a7040;color:#fff;}
.nav-btn.circle{width:36px;padding:0;border-radius:50%;font-size:16px;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.weekday{background:#e8f1ea;text-align:center;padding:8px 0;font-size:13px;font-weight:700;color:#5c7a62;border-radius:4px;}
.weekday:first-child,.weekday:last-child{color:#b83232;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{background:#dce8de;border:1.5px solid #b8ccbc;border-radius:5px;min-height:clamp(100px,10vw,140px);padding:6px 5px 4px;display:flex;flex-direction:column;gap:2px;cursor:pointer;overflow:hidden;}
.day-cell:hover{border-color:#3a6b45;background:#c6deca;}
.day-cell.other{background:#d4e1d6;opacity:.7;}
.day-cell.other .day-num{color:#8faa95;}
.day-cell.weekend .day-num,.day-cell.holiday .day-num{color:#b83232;}
.day-cell.today .day-num{background:#3a6b45;color:#fff;}
.cell-head{display:flex;align-items:flex-start;gap:3px;flex-wrap:wrap;margin-bottom:1px;}
.day-num{font-family:'Syne','PingFang TC',sans-serif;font-size:14px;font-weight:800;width:25px;height:25px;display:grid;place-items:center;border-radius:50%;flex-shrink:0;}
.hday-badge{background:#b83232;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;line-height:1.5;white-space:nowrap;align-self:center;}
.lunar{font-size:9px;color:#5c7a62;line-height:1.3;}
.shift-pill{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;white-space:nowrap;}
.evt-pill{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap;color:#1a1a1a;text-shadow:-1px -1px 0 rgba(255,255,255,.6),1px 1px 0 rgba(255,255,255,.6);}
.more{font-size:9px;color:#5c7a62;padding-left:2px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(28,45,32,.45);z-index:500;align-items:center;justify-content:center;padding:12px;}
.overlay.show{display:flex;}
.modal{background:#e8f1ea;border:1.5px solid #a4bcaa;border-radius:14px;width:100%;max-width:500px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(28,45,32,.22);}
.modal-hd{padding:14px 18px 11px;border-bottom:1.5px solid #b8ccbc;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0;}
.modal-title{font-family:'Syne','PingFang TC',sans-serif;font-weight:800;font-size:18px;color:#1c2d20;}
.modal-sub{font-size:12px;color:#5c7a62;margin-top:3px;}
.modal-x{background:none;border:none;color:#5c7a62;font-size:22px;cursor:pointer;line-height:1;padding:0;}
.modal-x:hover{color:#b83232;}
.modal-body{padding:14px 18px 18px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;flex:1;}
.flabel{font-family:'Syne','PingFang TC',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#3a6b45;margin-bottom:4px;display:block;}
.sublabel{font-size:11px;color:#5c7a62;margin-bottom:4px;display:block;}
.finput{width:100%;background:#dce8de;border:1.5px solid #a4bcaa;color:#1c2d20;padding:9px 11px;border-radius:7px;font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;}
.finput:focus{border-color:#3a6b45;}
select.finput{cursor:pointer;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.time-row{display:flex;gap:5px;align-items:center;}
.time-row select{flex:1;}
.time-colon{font-size:16px;color:#5c7a62;font-weight:700;flex-shrink:0;}
.color-grid{display:flex;flex-wrap:wrap;gap:5px;padding:2px;}
.cswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;flex-shrink:0;display:grid;place-items:center;font-size:12px;font-weight:900;}
.cswatch:hover{transform:scale(1.2);}
.cswatch.sel{border-color:#333;transform:scale(1.15);}
.cswatch.sel::after{content:'✓';}
.evt-list{display:flex;flex-direction:column;gap:3px;}
.evt-item{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:7px;background:#dce8de;border:1.5px solid #b8ccbc;cursor:pointer;}
.evt-item:hover{border-color:#3a6b45;background:#c6deca;}
.ei-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ei-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ei-meta{font-size:10px;color:#5c7a62;flex-shrink:0;}
.ei-del{background:none;border:none;color:#8faa95;font-size:18px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;}
.ei-del:hover{color:#b83232;}
.hosp-form{background:#dce8de;border:1.5px solid #b8ccbc;border-radius:9px;padding:11px;display:flex;flex-direction:column;gap:9px;}
.doc-row{display:flex;gap:6px;align-items:center;}
.doc-row input{flex:1;}
.btn-cgmh{display:inline-flex;align-items:center;background:#1a5040;color:#fff;border:none;padding:8px 11px;border-radius:7px;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.detail-card{background:#dce8de;border-radius:9px;padding:12px;border:1.5px solid #b8ccbc;}
.drow{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;}
.drow:last-child{margin-bottom:0;}
.dkey{font-family:'Syne','PingFang TC',sans-serif;font-size:10px;font-weight:700;color:#5c7a62;letter-spacing:.08em;min-width:44px;padding-top:2px;}
.dval{font-size:13px;color:#1c2d20;flex:1;}
.divider{height:1px;background:#b8ccbc;}
.btn-ok{width:100%;background:#3a6b45;color:#fff;border:none;padding:11px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}
.btn-ok:hover{opacity:.87;}
.btn-del{width:100%;background:transparent;color:#5c7a62;border:1.5px solid #a4bcaa;padding:9px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
.btn-del:hover{border-color:#b83232;color:#b83232;}
.day-num,.month-title,.shift-pill,.evt-pill,.ei-meta,.hday-badge,.more,.nav-btn,.modal-title,.modal-sub,.dval,input.finput,select.finput{font-family:'Calibri','Noto Sans TC','PingFang TC',sans-serif;}
@media(max-width:600px){.day-cell{min-height:65px;padding:3px;}.day-num{font-size:12px;width:21px;height:21px;}.lunar{display:none;}.controls{gap:7px;}}
</style>
</head>
<body>
<div class="page">
  <div class="label-tag">行事曆</div>
  <div class="month-title" id="monthTitle">2026 <span>四月</span></div>
  <div class="controls">
    <div class="quick-wrap" id="quickWrap">
      <button class="quick-trigger" id="quickTrigger">&#9733; 常用行程</button>
      <div class="quick-dd" id="quickDd">
        <div class="qopt" data-type="dine" data-name="聚餐" data-color="#b83232">&#127829; 聚餐</div>
        <div class="qopt" data-type="trip" data-name="出遊" data-color="#5c35b0">&#128663; 出遊</div>
        <div class="qopt" data-type="fishing" data-name="釣蝦" data-color="#f472b6">&#129424; 釣蝦</div>
        <div class="qopt" data-type="overtime" data-name="加班" data-color="#1a1a1a">&#128188; 加班</div>
      </div>
    </div>
    <div class="ov-group">
      <label class="ov-label"><input type="checkbox" id="ovAsml"/><span class="asml-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1065 300"><g transform="translate(-353.3275,-273.78)"><polygon points="1065.83,566.929 1102.68,388.346 1116.71,566.929 1196.223,566.929 1159.373,283.464 1074.333,283.464 1034.646,453.542 994.964,283.464 909.924,283.464 873.072,566.929 952.443,566.929 966.617,388.346 1003.468,566.929" fill="#0f238c"/><polygon points="1312.442,283.464 1235.907,283.464 1235.907,566.929 1417.324,566.929 1417.324,507.401 1312.442,507.401" fill="#0f238c"/><path d="m535.749,283.464-96.379,0-85.039,283.465 85.04,0 11.338,-51.023 73.701,0 11.339,51.023 85.04,0-85.04,-283.465zm-48.189,62.362 25.512,116.22-51.024,0.001 25.512,-116.221z" fill="#0f238c"/><path d="m824.881,362.835c-70.432,-61.604-180.339,-36.558-181.417,19.843-15.981,-104.645 110.563,-126.492 181.41,-93.544 1.262,16.802 2.527,34.892 0.007,73.701z" fill="#0f238c"/><path d="m766.445,396.213c-17.745,-6.926-43.562,-13.227-43.599,-33.403-0.015,-8.241 3.375,-17.189 19.83,-22.651-56.693,5.669-75.599,74.633-12.896,108.91 10.928,5.974 29.904,12.311 29.904,32.82 0,23.957-26.32,32.617-43.634,32.251-28.761,-0.605-51.885,-10.652-78.256,-29.417l0,68.032c31.207,13.434 82.039,28.928 132.996,13.256 41.183,-12.666 76.768,-47.236 76.768,-84.123 0.002,-60.022-52.091,-74.346-81.113,-85.675z" fill="#0f238c"/></g></svg></span></label>
      <label class="ov-label"><input type="checkbox" id="ovAdeng"/><span style="font-size:13px;font-weight:700;">阿鐙</span></label>
      <label class="ov-label"><input type="checkbox" id="ovAq"/><span style="font-size:13px;font-weight:700;">阿Q</span></label>
    </div>
    <div class="nav-group">
      <button class="nav-btn circle" id="prevBtn">&#8592;</button>
      <button class="nav-btn" id="todayBtn">今天</button>
      <button class="nav-btn circle" id="nextBtn">&#8594;</button>
    </div>
  </div>
  <div class="weekdays"><div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div><div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div></div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- 日期 Modal -->

<div class="overlay" id="dayModal"><div class="modal">
  <div class="modal-hd"><div><div class="modal-title" id="mTitle"></div><div class="modal-sub" id="mSub">點行程查看詳情</div></div><button class="modal-x" id="mClose">&#10005;</button></div>
  <div class="modal-body">
    <div id="existSec" style="display:none"><label class="flabel">已有行程</label><div class="evt-list" id="evtList"></div><div class="divider" style="margin-top:6px;"></div></div>
    <div><label class="flabel">行程類型</label><select class="finput" id="evtType"><option value="normal">一般行程</option><option value="dine">&#127829; 聚餐</option><option value="trip">&#128663; 出遊</option><option value="fishing">&#129424; 釣蝦</option><option value="overtime">&#128188; 加班</option></select></div>
    <div id="nameRow"><label class="flabel">行程名稱</label><input class="finput" id="evtName" placeholder="輸入行程名稱..." autocomplete="off"/></div>
    <div class="hosp-form" id="hospForm" style="display:none;">
      <label class="flabel" style="color:#2e7d6e;">醫院門診資訊</label>
      <div><label class="sublabel">醫院</label><select class="finput" id="hHosp"><option value="">— 選擇醫院 —</option><option value="8">高雄長庚紀念醫院</option><option value="T">高雄市立鳳山醫院</option><option value="other">其他</option></select></div>
      <div id="hOtherRow" style="display:none;"><label class="sublabel">醫院名稱</label><input class="finput" id="hOtherName" placeholder="請輸入醫院名稱"/></div>
      <div id="hDeptRow" style="display:none;"><label class="sublabel">科別</label><select class="finput" id="hDept"><option value="">— 選擇科別 —</option></select></div>
      <div id="hDeptTextRow" style="display:none;"><label class="sublabel">科別</label><input class="finput" id="hDeptText" placeholder="科別（自行輸入）"/></div>
      <div><label class="sublabel">醫師</label><div class="doc-row"><input class="finput" id="hDoctorText" placeholder="醫師姓名"/><a id="hDocLink" class="btn-cgmh" href="#" target="_blank" rel="noopener" style="display:none;">&#128279; 查醫師</a></div></div>
      <div class="row2"><div><label class="sublabel">看診號碼</label><input class="finput" id="hNum" placeholder="e.g. 18"/></div><div><label class="sublabel">時間</label><div class="time-row"><select class="finput" id="hHr"></select><span class="time-colon">:</span><select class="finput" id="hMn"></select></div></div></div>
    </div>
    <div id="evtPlaceRow" style="display:none;"><label class="flabel">地點（選填）</label><input class="finput" id="evtPlace" placeholder="店名或地點..."/></div>
    <div id="evtHotelRow" style="display:none;"><label class="flabel">住宿（選填）</label><input class="finput" id="evtHotel" placeholder="飯店或住宿名稱..."/></div>
    <div id="evtOTRow" style="display:none;"><label class="flabel">加班人員</label><select class="finput" id="evtOTPerson"><option value="adeng">阿鐙</option><option value="aq">阿Q</option></select></div>
    <div><label class="flabel">日期區間</label><div class="row2"><div><label class="sublabel">開始日期</label><input class="finput" type="date" id="evtS"/></div><div id="evtEWrap"><label class="sublabel">結束日期（選填）</label><input class="finput" type="date" id="evtE"/></div></div></div>
    <div id="evtTimeRow"><label class="flabel">時間（選填）</label><div class="time-row"><select class="finput" id="evtHr"></select><span class="time-colon">:</span><select class="finput" id="evtMn"></select></div></div>
    <div id="colorRow"><label class="flabel">顏色</label><div class="color-grid" id="colorGrid"></div></div>
    <button class="btn-ok" id="addBtn">＋ 新增行程</button>
  </div>
</div></div>

<!-- 詳情 Modal -->

<div class="overlay" id="detModal"><div class="modal" style="max-width:400px;">
  <div class="modal-hd"><div><div class="modal-title" id="detTitle"></div><div class="modal-sub" id="detSub"></div></div><button class="modal-x" id="detClose">&#10005;</button></div>
  <div class="modal-body"><div class="detail-card" id="detCard"></div><button class="btn-del" id="detDel">&#128465; 刪除此行程</button></div>
</div></div>

<!-- 快速行程 Modal -->

<div class="overlay" id="quickModal"><div class="modal" style="max-width:420px;">
  <div class="modal-hd"><div><div class="modal-title" id="qTitle">新增快速行程</div><div class="modal-sub">選擇日期後確認</div></div><button class="modal-x" id="qClose">&#10005;</button></div>
  <div class="modal-body">
    <div class="hosp-form" id="qHospForm" style="display:none;">
      <label class="flabel" style="color:#2e7d6e;">醫院門診資訊</label>
      <div><label class="sublabel">醫院</label><select class="finput" id="qHosp"><option value="">— 選擇醫院 —</option><option value="8">高雄長庚紀念醫院</option><option value="T">高雄市立鳳山醫院</option><option value="other">其他</option></select></div>
      <div id="qOtherRow" style="display:none;"><label class="sublabel">醫院名稱</label><input class="finput" id="qOtherName" placeholder="請輸入醫院名稱"/></div>
      <div id="qDeptRow" style="display:none;"><label class="sublabel">科別</label><select class="finput" id="qDept"><option value="">— 選擇科別 —</option></select></div>
      <div id="qDeptTextRow" style="display:none;"><label class="sublabel">科別</label><input class="finput" id="qDeptText" placeholder="科別（自行輸入）"/></div>
      <div><label class="sublabel">醫師</label><div class="doc-row"><input class="finput" id="qDoctorText" placeholder="醫師姓名"/><a id="qDocLink" class="btn-cgmh" href="#" target="_blank" rel="noopener" style="display:none;">&#128279; 查醫師</a></div></div>
      <div class="row2"><div><label class="sublabel">看診號碼</label><input class="finput" id="qNum" placeholder="e.g. 18"/></div><div><label class="sublabel">時間</label><div class="time-row"><select class="finput" id="qHHr"></select><span class="time-colon">:</span><select class="finput" id="qHMn"></select></div></div></div>
    </div>
    <div id="qPlaceRow" style="display:none;"><label class="flabel">地點（選填）</label><input class="finput" id="qPlace" placeholder="店名或地點..."/></div>
    <div id="qHotelRow" style="display:none;"><label class="flabel">住宿（選填）</label><input class="finput" id="qHotel" placeholder="飯店或住宿名稱..."/></div>
    <div id="qOvertimeRow" style="display:none;"><label class="flabel">加班人員</label><select class="finput" id="qOvertimePerson"><option value="adeng">阿鐙</option><option value="aq">阿Q</option></select></div>

var LMDAYS=[30,29,30,29,30,29,30,30,29,30,29,30];
function lunarOf(d){
  var diff=Math.round((d-LB)/86400000);
  if(diff<-30)return{txt:''};
  if(diff<0){var d2=30+diff;return d2>=0?{txt:LD[d2],isFirst:d2===0,month:'臘月'}:{txt:''};}
  var r=diff,mi=0;
  while(true){var md=LMDAYS[mi%12]||30;if(r<md)break;r-=md;mi++;if(mi>24)break;}
  return{txt:LD[Math.min(r,29)],isFirst:r===0,month:LM[mi%12]};
}

function lum(hex){
  var r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  var f=function(c){return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);};
  return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b);
}

// ── 行程查詢 ──
function buildSpanCache(){
  _spanCache={};
  var keys=Object.keys(evts);
  for(var ki=0;ki<keys.length;ki++){
    var k=keys[ki];
    var arr=evts[k]||[];
    for(var ai=0;ai<arr.length;ai++){
      var ev=arr[ai];
      if(!ev.endDate)continue;
      var s=pdk(k),e2=pdk(ev.endDate);
      var sTs=new Date(s.y,s.m,s.d).getTime();
      var eTs=new Date(e2.y,e2.m,e2.d).getTime();
      var cur2=new Date(sTs);
      while(cur2.getTime()<=eTs){
        var k2=dk(cur2.getFullYear(),cur2.getMonth(),cur2.getDate());
        if(k2!==k){
          if(!_spanCache[k2])_spanCache[k2]=[];
          _spanCache[k2].push({ev:ev,srcKey:k,srcIdx:ai,isSpanning:true});
        }
        cur2.setDate(cur2.getDate()+1);
      }
    }
  }
}
function evtsFor(key){
  var result=[];
  var arr=evts[key]||[];
  for(var i=0;i<arr.length;i++)result.push({ev:arr[i],srcKey:key,srcIdx:i,isSpanning:false});
  if(_spanCache&&_spanCache[key]){
    var sp=_spanCache[key];
    for(var i=0;i<sp.length;i++)result.push(sp[i]);
  }
  return result;
}

// ── build 行事曆 ──
function build(){
  buildSpanCache();
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById('monthTitle').innerHTML=y+' <span>'+ZHM[m]+'</span>';
  var grid=document.getElementById('calGrid');grid.innerHTML='';
  var fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),dp=new Date(y,m,0).getDate();
  var total=Math.ceil((fd+dm)/7)*7;
  for(var i=0;i<total;i++){
    var dn,cy=y,cm=m,other=false;
    if(i<fd){dn=dp-fd+1+i;cm=m-1;if(cm<0){cm=11;cy--;}other=true;}
    else if(i-fd>=dm){dn=i-fd-dm+1;cm=m+1;if(cm>11){cm=0;cy++;}other=true;}
    else dn=i-fd+1;
    var cd=new Date(cy,cm,dn),dow=i%7;
    var isToday=!other&&dn===TODAY.getDate()&&m===TODAY.getMonth()&&y===TODAY.getFullYear();
    var key=dk(cy,cm,dn),hday=HOLIDAYS[key];
    var cell=document.createElement('div');
    cell.className='day-cell'+(other?' other':'')+(isToday?' today':'')+(dow===0||dow===6?' weekend':'')+(hday?' holiday':'');
    (function(a,b,c){cell.onclick=function(){openDay(a,b,c);};})(cy,cm,dn);
    // 日期頭
    var head=document.createElement('div');head.className='cell-head';
    var numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=dn;head.appendChild(numEl);
    if(hday&&!other){var hb=document.createElement('span');hb.className='hday-badge';hb.textContent=hday;head.appendChild(hb);}
    cell.appendChild(head);
    // 農曆
    if(!other){var lu=lunarOf(cd);if(lu.txt){var ll=document.createElement('div');ll.className='lunar';ll.textContent=lu.isFirst?lu.month:lu.txt;cell.appendChild(ll);}}
    // 中鋼
    if(ovCsg){var ci=csgOf(cd);if(ci.work){var cb=document.createElement('div');cb.className='shift-pill';var cF=isOnLeave('csg',key);cb.style.cssText='background:rgba(254,240,138,.85);color:#1a1a1a;border-left:2px solid #aaa;'+(cF?'opacity:.3;':'');cb.textContent='中鋼'+(CSG_NAME[ci.shift]||ci.shift);cell.appendChild(cb);}}
    // ASML
    if(ovAsml){var ai2=asmlOf(cd);if(ai2.work){var ab=document.createElement('div');ab.className='shift-pill';var aF=isOnLeave('asml',key);ab.style.cssText='background:rgba(255,179,130,.6);color:#1a1a1a;border-left:2px solid #aaa;'+(aF?'opacity:.3;':'');ab.textContent='ASML班';cell.appendChild(ab);}}
    // 阿鐙
    if(ovAdeng){var di=adengOf(cd);if(di.work){var db=document.createElement('div');db.className='shift-pill';var dF=isOnLeave('adeng',key);db.style.cssText='background:rgba(255,182,193,.7);color:#1a1a1a;border-left:2px solid #aaa;'+(dF?'opacity:.3;':'');db.textContent='阿鐙'+(ADENG_NAME[di.shift]||di.shift);cell.appendChild(db);}}
    // 阿Q
    if(ovAq){var qi=aqOf(cd);if(qi.work){var qb=document.createElement('div');qb.className='shift-pill';var qF=isOnLeave('aq',key);qb.style.cssText='background:rgba(196,181,253,.5);color:#1a1a1a;border-left:2px solid #aaa;'+(qF?'opacity:.3;':'');qb.textContent='阿Q-班';cell.appendChild(qb);}}
    // 行程
    var dayEvts=evtsFor(key);
    for(var ei=0;ei<dayEvts.length;ei++){
      var obj=dayEvts[ei],ev=obj.ev;
      var pp=document.createElement('div');pp.className='evt-pill';
      var icon=ev.name==='醫院領藥'?'\uD83D\uDC8A ':'\uD83C\uDFE5 ';
      var lbl=(ev.type==='hospital')?(icon+(ev.hospital||ev.dept||ev.name)):(ev.name+(ev.place?' @ '+ev.place:''));
      pp.style.background=ev.color||'#2e7d6e';if(ev._leaveStyle){pp.style.cssText='background:#1a1a1a;color:#fff;text-shadow:none;';}if(ev._otStyle){pp.style.cssText='background:#1a1a1a;color:#fbbf24;text-shadow:none;font-weight:700;';}
      pp.textContent=(lbl+(ev.time?' '+ev.time:'')).substring(0,16);
      cell.appendChild(pp);
    }
    grid.appendChild(cell);
  }
}

// ── 已有行程列表 ──
function shiftLeaveKey(shId,dk2){return '__leave__'+shId+'__'+dk2;}
function isOnLeave(shId,dk2){
  var arr=evts[dk2]||[];
  var key=shiftLeaveKey(shId,dk2);
  for(var i=0;i<arr.length;i++){if(arr[i]._leaveId===key)return true;}
  return false;
}
function toggleLeave(shId,dk2,bg){
  var key=shiftLeaveKey(shId,dk2);
  if(!evts[dk2])evts[dk2]=[];
  var arr=evts[dk2];
  for(var i=0;i<arr.length;i++){
    if(arr[i]._leaveId===key){
      arr.splice(i,1);
      if(!evts[dk2].length)delete evts[dk2];
      save();renderExist();build();return;
    }
  }
  var nameMap={csg:'中鋼休',asml:'ASML休',adeng:'鐙休',aq:'Q休'};
  arr.push({name:nameMap[shId]||'休假',color:'#1a1a1a',type:'normal',_leaveId:key,_leaveStyle:true});
  save();renderExist();build();
}
function renderExist(){
  var sec=document.getElementById('existSec'),list=document.getElementById('evtList');
  var all=evtsFor(activeDk);
  list.innerHTML='';
  var shifts=[];
  if(activeDk){
    var p=activeDk.split('-');
    var cd2=new Date(+p[0],+p[1]-1,+p[2]);
    if(ovCsg){var ci=csgOf(cd2);if(ci.work)shifts.push({label:'中鋼-'+(CSG_NAME[ci.shift]||ci.shift),bg:'rgba(254,240,138,.85)',solid:'#f5c800',id:'csg'});}
    if(ovAsml){var ai3=asmlOf(cd2);if(ai3.work)shifts.push({label:'ASML班',bg:'rgba(255,179,130,.6)',solid:'#f5954a',id:'asml'});}
    if(ovAdeng){var di2=adengOf(cd2);if(di2.work)shifts.push({label:'阿鐙'+(ADENG_NAME[di2.shift]||di2.shift),bg:'rgba(255,182,193,.7)',solid:'#f5a0b0',id:'adeng'});}
    if(ovAq){var qi2=aqOf(cd2);if(qi2.work)shifts.push({label:'阿Q-班',bg:'rgba(196,181,253,.5)',solid:'#9b8fe0',id:'aq'});}
  }
  sec.style.display=(all.length||shifts.length)?'':'none';
  for(var si=0;si<shifts.length;si++){
    var sh=shifts[si];
    var onLeave=activeDk?isOnLeave(sh.id,activeDk):false;
    var sitem=document.createElement('div');sitem.className='evt-item';
    sitem.style.cssText='background:'+sh.bg+';border-color:rgba(0,0,0,.08);cursor:default;'+(onLeave?'opacity:.35;':'');
    var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;width:100%;gap:6px;';
    var snm=document.createElement('div');snm.className='ei-name';
    snm.style.fontWeight='700';snm.textContent=sh.label;
    var lbl=document.createElement('label');lbl.className='shift-leave-check';
    var chk=document.createElement('input');chk.type='checkbox';chk.checked=onLeave;
    chk.onclick=(function(shId,bg2){return function(e2){
      e2.stopPropagation();toggleLeave(shId,activeDk,bg2);
    };})(sh.id,sh.solid);
    lbl.appendChild(chk);
    var ltxt=document.createTextNode('休假');
    lbl.appendChild(ltxt);
    row.appendChild(snm);row.appendChild(lbl);
    sitem.appendChild(row);list.appendChild(sitem);
  }
  for(var i=0;i<all.length;i++){
    var obj=all[i],ev=obj.ev;
    var item=document.createElement('div');item.className='evt-item';
    var dot=document.createElement('div');dot.className='ei-dot';dot.style.background=ev.color||'#2e7d6e';
    var nm=document.createElement('div');nm.className='ei-name';
    var isMed=(ev.name==='醫院領藥');
    var prefix=(obj.isSpanning?'↔ ':'');
    if(ev.type==='hospital'){nm.textContent=prefix+(isMed?'💊 ':'🏥 ')+(ev.hospital||'門診');}
    else{nm.textContent=prefix+ev.name+(ev.place?' @ '+ev.place:'');}
    var meta=document.createElement('div');meta.className='ei-meta';
    if(ev.time)meta.textContent=ev.time;
    var del=document.createElement('button');del.className='ei-del';del.textContent='×';
    del.onclick=(function(sk,si2){return function(e2){
      e2.stopPropagation();
      if(evts[sk]){evts[sk].splice(si2,1);if(!evts[sk].length)delete evts[sk];}
      save();renderExist();build();
    };})(obj.srcKey,obj.srcIdx);
    item.onclick=(function(sk,si2){return function(){openDetail(sk,si2,activeDk);};})(obj.srcKey,obj.srcIdx);
    item.appendChild(dot);item.appendChild(nm);item.appendChild(meta);item.appendChild(del);
    list.appendChild(item);
  }
}

document.getElementById('addBtn').onclick=function(){
  var type=document.getElementById('evtType').value;
  var sDate=document.getElementById('evtS').value,eDate=document.getElementById('evtE').value;
  var hr=document.getElementById('evtHr').value,mn=document.getElementById('evtMn').value;

    var otPer=document.getElementById('evtOTPerson').value;
    ev.name=otPer==='adeng'?'鐙加班':'Q加班';

  } else if(type==='dine'){
    ev.name='膀餐';
    var p1=document.getElementById('evtPlace').value.trim();if(p1)ev.place=p1;
  } else if(type==='trip'){
    ev.name='出遊';

    var h2=document.getElementById('evtHotel').value.trim();if(h2)ev.hotel=h2;
  } else if(type==='fishing'){
    ev.name='釣暦';

function openDetail(srcKey,srcIdx,clickedKey){
  var ev=(evts[srcKey]||[])[srcIdx];if(!ev)return;
  detRef={srcKey:srcKey,srcIdx:srcIdx,clickedKey:clickedKey};
  var p=pdk(clickedKey||srcKey);
  var mL2=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var dicon=ev.name==='醫院領藥'?'\uD83D\uDC8A ':'\uD83C\uDFE5 ';
  document.getElementById('detTitle').textContent=(ev.type==='hospital')?(dicon+ev.name):ev.name;
  document.getElementById('detSub').textContent=p.y+'年 '+mL2[p.m]+' '+p.d+'日';
  var card=document.getElementById('detCard');card.innerHTML='';
  var rows=[];
  if(ev.type==='hospital'){
    if(ev.hospital)rows.push(['醫院',ev.hospital]);
    if(ev.dept)rows.push(['科別',ev.dept]);
    if(ev.doctor)rows.push(['醫師',ev.doctor]);
    if(ev.num)rows.push(['號碼',ev.num]);
  } else {
    rows.push(['行程',ev.name]);
    if(ev.place)rows.push(['地點',ev.place]);
    if(ev.hotel)rows.push(['住宿',ev.hotel]);
  }
  if(ev.time)rows.push(['時間',ev.time]);
  if(ev.endDate)rows.push(['結束',ev.endDate]);
  for(var ri=0;ri<rows.length;ri++){
    var row=document.createElement('div');row.className='drow';
    row.innerHTML='<div class="dkey">'+rows[ri][0]+'</div><div class="dval">'+rows[ri][1]+'</div>';
    card.appendChild(row);
  }
  document.getElementById('detModal').classList.add('show');
}
document.getElementById('detClose').onclick=function(){document.getElementById('detModal').classList.remove('show');};
document.getElementById('detModal').onclick=function(e){if(e.target===e.currentTarget)document.getElementById('detModal').classList.remove('show');};
document.getElementById('detDel').onclick=function(){
  if(!detRef)return;
  var sk=detRef.srcKey,si=detRef.srcIdx;
  if(evts[sk]){evts[sk].splice(si,1);if(!evts[sk].length)delete evts[sk];}
  save();document.getElementById('detModal').classList.remove('show');
  renderExist();build();
};

// ── 滑動切換月份 ──
(function(){
  var wrap=document.querySelector('.cal-grid'),sx=0,sy=0,st=0;
  wrap.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  wrap.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Date.now()-st<400&&Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0)cur.setMonth(cur.getMonth()+1);else cur.setMonth(cur.getMonth()-1);build();
    }
  },{passive:true});
})();
